# CI：每次 push / PR 自動跑語法檢查 + 全套測試（含 docIntegrity 文件完整性）。
# AI agent 讀結果：gh run list --limit 5 / gh run view <id> --log-failed
# （見 .claude/instructions.md 第 11 節「機器可驗證回饋契約」）
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax check (all src/config js)
        run: |
          set -e
          find src config tests -name "*.js" -print0 | while IFS= read -r -d '' f; do
            node --check "$f"
          done

      - name: Run test suite
        run: node tests/index.js
