<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Yes, Master! — MVP</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#D4A017" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Yes Master" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <style>
    *, *::before, *::after {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    html, body {
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
    }
    body { margin: 0; background: #1a1a1a; color: #eee; font-family: sans-serif; overflow: hidden; }
    /* #stage / #game の寸法は renderer.js が JS で制御（動態 tilePx）。CSS で固定しない。 */
    #stage { position: relative; background: #222; display: block; margin: 0 auto; width: fit-content; touch-action: none; }
    #game { display: block; image-rendering: pixelated; }
    #mode-badge { position: absolute; top: 8px; left: 8px; padding: 2px 8px;
      background: #2d6; color: #000; font-size: 12px; border-radius: 4px; }
    #version { position: absolute; bottom: 8px; right: 8px; font-size: 11px; opacity: 0.6; }
  </style>
</head>
<body>
  <div id="stage">
    <span id="mode-badge">單人模式</span>
    <canvas id="game"></canvas>
    <span id="version">v0.0.11.0</span>
  </div>
  <!-- 全模組化：ES Module 入口（鐵則 7） -->
  <script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
